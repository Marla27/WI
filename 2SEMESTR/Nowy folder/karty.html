    <script>
        const arr = ["2ظآب", "3ظآب", "4ظآب", "5ظآب", "6ظآب", "7ظآب", "8ظآب", "9ظآب", "10ظآب", "Jظآب", "Qظآب", "Kظآب", "Aظآب",

        for (let i = 0; i < arr.length; i++) {
           
            const j = Math.floor(Math.random() * arr.length);
            // let tmp = arr[i];
            // arr[i]=arr[j];
            // arr[j]=tmp;
           
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        
        const wynik = arr.slice(0, 13);
        const wynik2 = arr.slice(13, 26);
        const wynik3 = arr.slice(26, 39);
        const wynik4 = arr.slice(39, 52);

        document.getElementById("kontener").innerText = wynik.join(", "); 
        document.getElementById("kontener2").innerText = wynik2.join(", ");
         document.getElementById("kontener3").innerText = wynik3.join(", ");
