<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="kontener"></div>

    <script>
        const arr = ["2ظآب", "3ظآب", "4ظآب", "5ظآب", "6ظآب", "7ظآب", "8ظآب", "9ظآب", "10ظآب", "Jظآب", "Qظآب", "Kظآب", "Aظآب",
          "2ظآح", "3ظآح", "4ظآح", "5ظآح", "6ظآح", "7ظآح", "8ظآح", "9ظآح", "10ظآح", "Jظآح", "Qظآح", "Kظآح", "Aظآح",
          "2ظآخ", "3ظآخ", "4ظآخ", "5ظآخ", "6ظآخ", "7ظآخ", "8ظآخ", "9ظآخ", "10ظآخ", "Jظآخ", "Qظآخ", "Kظآخ", "Aظآخ",
          "2ظآث", "3ظآث", "4ظآث", "5ظآث", "6ظآث", "7ظآث", "8ظآث", "9ظآث", "10ظآث", "Jظآث", "Qظآث", "Kظآث", "Aظآث"];

        
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }

     
        let output = "";
        for (let row = 0; row < 4; row++) {
            
            const rowCards = arr.slice(row * 13, (row * 13) + 13);
            output += rowCards.join(", ") + "<br>";
        }

        
        document.getElementById("kontener").innerHTML = output;
    </script>
</body>
</html>
