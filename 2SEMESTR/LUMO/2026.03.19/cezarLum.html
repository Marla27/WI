<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szyfr Cezara - Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: bold;
        }
        textarea, input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Ważne dla paddingu */
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
            color: white;
        }
        .btn-encrypt {
            background-color: #4CAF50;
        }
        .btn-encrypt:hover {
            background-color: #45a049;
        }
        .btn-decrypt {
            background-color: #2196F3;
        }
        .btn-decrypt:hover {
            background-color: #0b7dda;
        }
        .result-area {
            background-color: #eef;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #ccd;
            min-height: 50px;
            word-wrap: break-word;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .hint {
            font-size: 0.85rem;
            color: #777;
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Szyfr Cezara</h1>
    
    <label for="inputText">Tekst wejściowy:</label>
    <textarea id="inputText" placeholder="Wpisz tutaj swój tekst..."></textarea>

    <label for="shiftKey">Klucz (przesunięcie):</label>
    <input type="number" id="shiftKey" value="3" min="0" max="25">

    <div class="controls">
        <button class="btn-encrypt" onclick="processText('encrypt')">Zaszyfruj</button>
        <button class="btn-decrypt" onclick="processText('decrypt')">Deszyfruj</button>
    </div>

    <label>Wynik:</label>
    <div id="outputText" class="result-area">Wynik pojawi się tutaj...</div>
    
    <p class="hint">Działa tylko dla liter alfabetu łacińskiego (A-Z, a-z). Znaki specjalne i spacje pozostają bez zmian.</p>
</div>

<script>
    function caesarCipher(str, shift) {
        // Normalizacja klucza, aby był w zakresie 0-25
        shift = shift % 26;
        if (shift < 0) shift += 26;

        return str.replace(/[a-zA-Z]/g, function(char) {
            const base = char >= 'a' ? 97 : 65; // 97 dla 'a', 65 dla 'A'
            const code = char.charCodeAt(0);
            
            // Przesunięcie i obsługa pętli (modulo 26)
            const newCode = ((code - base + shift) % 26) + base;
            
            return String.fromCharCode(newCode);
        });
    }

    function processText(mode) {
        const input = document.getElementById('inputText').value;
        let shift = parseInt(document.getElementById('shiftKey').value);
        
        if (isNaN(shift)) {
            alert("Proszę podać poprawny klucz numeryczny.");
            return;
        }

        let result = "";

        if (mode === 'encrypt') {
            // Szyfrowanie: dodajemy przesunięcie
            result = caesarCipher(input, shift);
        } else if (mode === 'decrypt') {
            // Deszyfrowanie: odejmujemy przesunięcie (lub dodajemy ujemne)
            result = caesarCipher(input, -shift);
        }

        document.getElementById('outputText').textContent = result;
    }
</script>

</body>
</html>
