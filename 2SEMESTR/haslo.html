<body>
    <script>

       let n ="m,a,i,l,@,g,m,a,i,l,.,c,o,m"
       let a = n.split(",").reverse().join(""); 
       document.write(a);
       document.write("<br>");
       document.write(isPerfect(6));
       document.write("<br>");
       document.write(Pali("ABABA"));
    document.write(cezar());

        
       


        function isPrime(x){ //isPerfect
            for(i=2;i<Math.sqrt(x);i++){
            if(x%i==0)
            return false;
            }
            return true;
    
        }
        function isPerfect(x){
        
            let h=0;
           for(i=0;i<(x-1);i++){
            if(x%i==0)
            h+=i;
            }
           if(h==x){
            return true
           }
            else 
            return false
            
      
        }
      

        function Pali(text){
            for(i=0;i<text.length;i++){
                if(text.charAt(i)!=text.charAt(text.length-1-i)){
                    return false;
                }
                else
                return true;
            }
        }
        function cezar(){
        let Al ="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let Hl = "TKTVAGHYHUBT";//DEF   %26
        let key = 7;
        let newHl= "";
        for(i=0;i<Hl.length;i++){
            for(j=0;j<Al.length;j++){
                if(Hl.charAt(i)===Al.charAt(j)){
                    let newindex =(j+key)%26
                     newHl += Al[newindex]
                    
                }
            }
        }
       return newHl
        }
    
        

    </script>
