<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      #kontener{
        display: grid;
        grid-template-columns: repeat(5,1fr);
        gap: 20px;
      }
      #kontener>img{
        width: 100%;
      }
    </style>
</head>
<body>

  <div id="kontener">
    <!-- Tutaj możesz dodać obrazki, jeśli masz gotowe pliki kart -->
  </div>  

<script>
let kolory = ['clubs', 'spades', 'hearts', 'diamonds'];  
let numery = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'jack', 'queen', 'king', 'ace'];
let player = [];
let casino = [];

function gra() {
  // --- LOSOWANIE DLA GRACZA ---
  for(let i = 0; i < 5; i++) {
    let cart, color, card;
    
    // Pętla losuje kartę, dopóki nie znajdzie takiej, której nie ma w tablicy
    do {
      cart = numery[Math.floor(Math.random() * 13)]; 
      color = kolory[Math.floor(Math.random() * 4)];
      card = cart + "_of_" + color;
    } while (player.includes(card)); // Sprawdzamy całą tablicę, nie tylko poprzedni element

    player[i] = card; // Dopiero teraz przypisujemy pewną kartę
  }

  // --- LOSOWANIE DLA KASYNA (dodane) ---
  for(let i = 0; i < 5; i++) {
    let cart, color, card;
    
    do {
      cart = numery[Math.floor(Math.random() * 13)]; 
      color = kolory[Math.floor(Math.random() * 4)];
      card = cart + "_of_" + color;
    } while (player.includes(card) || casino.includes(card)); // Sprawdzamy obie ręce

    casino[i] = card;
  }

  // Wyświetlenie wyników w konsoli
  console.log("Gracz:", player);
  console.log("Kasyno:", casino);
  
  // Opcjonalnie: wyświetlenie w HTML (jeśli chcesz)
  const kontener = document.getElementById('kontener');
  kontener.innerHTML = ''; // Czyścimy kontener
  
  // Dodajemy karty gracza jako tekst (możesz podmienić na img)
  player.forEach(card => {
    const div = document.createElement('div');
    div.textContent = card;
    div.style.border = "1px solid black";
    div.style.padding = "10px";
    div.style.textAlign = "center";
    kontener.appendChild(div);
  });
}

gra();
</script>
</body>
</html>
